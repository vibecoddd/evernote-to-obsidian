<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}印象笔记到Obsidian迁移工具{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body class="notion-theme">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='img/brand-logo.svg') }}" alt="品牌logo" height="30" class="me-2">
                <span class="text-dark fw-semibold">印象笔记迁移工具</span>
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link text-muted" href="{{ url_for('index') }}">
                    <i class="fas fa-home me-1"></i>
                    <span>首页</span>
                </a>

            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="container py-5">
        <div class="max-w-3xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="py-4 mt-5 border-top">
        <div class="container text-center">
            <small class="text-muted">
                印象笔记到Obsidian迁移工具 © 2024
            </small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
