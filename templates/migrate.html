{% extends "base.html" %}

{% block title %}导出印象笔记到ENEX{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0">
                    <i class="fas fa-download me-2"></i>导出印象笔记到ENEX
                </h4>
            </div>
            <div class="card-body">
                <form id="exportForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label">
                                <i class="fas fa-user me-1"></i>印象笔记账号（邮箱）
                            </label>
                            <input type="email" class="form-control" id="username" required
                                   placeholder="请输入印象笔记登录邮箱">
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-1"></i>印象笔记密码
                            </label>
                            <input type="password" class="form-control" id="password" required
                                   placeholder="请输入印象笔记登录密码">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="evernoteBackend" class="form-label">
                                <i class="fas fa-server me-1"></i>印象笔记版本
                            </label>
                            <select class="form-select" id="evernoteBackend">
                                <option value="china" selected>印象笔记中国版 (推荐)</option>
                                <option value="international">Evernote国际版</option>
                            </select>
                            <div class="form-text">
                                中国用户通常使用印象笔记中国版
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="exportDirectory" class="form-label">
                                <i class="fas fa-folder me-1"></i>ENEX导出目录
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="exportDirectory"
                                       placeholder="选择ENEX文件导出目录" value="">
                                <input type="file" id="folderInput" style="display: none" 
                                       webkitdirectory directory multiple>
                                <button class="btn btn-secondary" onclick="document.getElementById('folderInput').click()" type="button">
                                    选择
                                </button>
                            </div>
                            <div class="form-text">
                                选择用于保存导出的ENEX文件的目录。如果目录不存在，系统将自动创建。
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        <strong>注意：</strong>您的账号密码仅用于连接印象笔记服务器导出数据，不会被保存或上传。
                    </div>

                    <!-- 加载状态指示器 -->
                    <div id="loadingIndicator" style="display: none; text-align: center; margin-top: 20px;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2">正在导出ENEX文件，请稍候...</p>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="button" class="btn btn-primary" onclick="startExport()">
                            <i class="fas fa-download me-1"></i>开始导出ENEX
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>

document.addEventListener('DOMContentLoaded', function() {
    // 自动设置默认导出目录
    function setDefaultExportDirectory() {
        const exportDirectoryInput = document.getElementById('exportDirectory');
        if (!exportDirectoryInput) return;

        // 检测操作系统
        const userAgent = navigator.userAgent;
        let defaultPath = '';

        if (userAgent.includes('Windows')) {
            // Windows系统默认放在C盘的EvernoteExport目录
            defaultPath = 'C:\\EvernoteExport';
        } else if (userAgent.includes('Macintosh')) {
            // Mac系统默认放在文档目录下EvernoteExport
            defaultPath = '~/Documents/EvernoteExport';
        } else {
            // 其他系统使用临时目录
            defaultPath = '/tmp/evernote_export';
        }

        exportDirectoryInput.value = defaultPath;
    }

    // 调用函数设置默认目录
    setDefaultExportDirectory();

    // 添加文件夹选择事件监听
    const folderInput = document.getElementById('folderInput');
    if (folderInput) {
        folderInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                const firstFile = files[0];
                let folderPath = '';
                
                if (firstFile.webkitRelativePath) {
                    // 获取文件夹路径
                    folderPath = firstFile.path.substring(0, firstFile.path.indexOf(firstFile.webkitRelativePath));
                    // 处理Windows路径
                    if (folderPath.includes('\\')) {
                        folderPath = folderPath.replace(/\\/g, '\\\\');
                    }
                } else {
                    // 直接获取文件夹路径
                    folderPath = firstFile.path.substring(0, firstFile.path.lastIndexOf('/'));
                }
                
                console.log('选择的文件夹路径:', folderPath);
                
                const exportDirectoryInput = document.getElementById('exportDirectory');
                if (exportDirectoryInput) {
                    exportDirectoryInput.value = folderPath;
                }
            }
        });
    }
});

// 开始导出ENEX
function startExport() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const backend = document.getElementById('evernoteBackend').value;
    const exportDirectory = document.getElementById('exportDirectory').value.trim();
    const exportButton = document.querySelector('.btn-primary');
    const loadingIndicator = document.getElementById('loadingIndicator');

    if (!username || !password) {
        alert('请输入用户名和密码');
        return;
    }

    if (!exportDirectory) {
        alert('请选择导出目录');
        return;
    }

    // 显示加载状态
    loadingIndicator.style.display = 'block';
    // 禁用导出按钮
    exportButton.disabled = true;
    exportButton.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>导出中...';

    // 准备导出配置
    const exportConfig = {
        evernote_credentials: {
            username: username,
            password: password
        },
        evernote_backend: backend,
        output: {
            enex_directory: exportDirectory
        }
    };

    console.log('开始导出ENEX，配置:', exportConfig);

    // 发送导出请求
    fetch('/api/export_enex', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(exportConfig)
    })
    .then(response => response.json())
    .then(data => {
        // 隐藏加载状态
        loadingIndicator.style.display = 'none';
        // 恢复导出按钮
        exportButton.disabled = false;
        exportButton.innerHTML = '<i class="fas fa-download me-1"></i>开始导出ENEX';

        if (data.success) {
            // 显示成功提示
            alert('ENEX导出成功！文件已保存到: ' + exportDirectory);
        } else {
            // 显示失败提示
            alert('导出失败: ' + data.error);
        }
    })
    .catch(error => {
        // 隐藏加载状态
        loadingIndicator.style.display = 'none';
        // 恢复导出按钮
        exportButton.disabled = false;
        exportButton.innerHTML = '<i class="fas fa-download me-1"></i>开始导出ENEX';
        
        console.error('导出请求失败:', error);
        alert('导出请求失败: ' + error);
    });
}

</script>
{% endblock %}
