{% extends "base.html" %}

{% block title %}首页 - 印象笔记迁移工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        <!-- 欢迎区域 -->
        <div class="text-center mb-8">
            <h1 class="display-4">
                印象笔记迁移工具
            </h1>
            <p class="lead">
                简单高效的印象笔记数据导出工具
            </p>
        </div>

        <!-- 开始使用 -->
        <div class="card">
            <div class="card-body p-6">
                <h4 class="mb-4">
                    开始导出
                </h4>
                <p class="mb-5">
                    输入您的印象笔记账号，一键导出所有笔记
                </p>
                <div class="d-grid">
                    <a href="{{ url_for('migrate_page') }}" class="btn btn-primary">
                        开始导出
                    </a>
                </div>
            </div>
        </div>

        <!-- 使用提示 -->
        <div class="alert mt-6" role="alert">
            <p class="mb-0">
                请确保您的网络连接正常，导出过程中不要关闭浏览器窗口。
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('首页加载完成');
});
</script>
{% endblock %}
