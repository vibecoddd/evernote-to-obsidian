{% extends "base.html" %}

{% block title %}迁移结果 - 印象笔记迁移工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card border-0 shadow mb-4">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0">
                    <i class="fas fa-chart-bar me-2"></i>迁移历史
                </h4>
            </div>
            <div class="card-body">
                <div id="migrationHistory">
                    <div class="text-center text-muted py-5">
                        <i class="fas fa-history fa-3x mb-3"></i>
                        <p>暂无迁移记录</p>
                        <a href="{{ url_for('migrate_page') }}" class="btn btn-primary">
                            <i class="fas fa-play me-1"></i>开始第一次迁移
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow" id="latestResult" style="display: none;">
            <div class="card-header bg-success text-white">
                <h4 class="card-title mb-0">
                    <i class="fas fa-info-circle me-2"></i>迁移详情
                </h4>
            </div>
            <div class="card-body" id="resultDetails"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let migrationHistory = [];

document.addEventListener('DOMContentLoaded', function() {
    loadMigrationHistory();
});

function localSessionToken() {
    return document.querySelector('meta[name="local-session-token"]').content;
}

function authHeaders(extra = {}) {
    return {
        ...extra,
        'X-Evernote2Obsidian-Token': localSessionToken()
    };
}

async function loadMigrationHistory() {
    const historyDiv = document.getElementById('migrationHistory');
    const response = await fetch('/api/tasks', { headers: authHeaders() });
    if (!response.ok) {
        historyDiv.innerHTML = '<div class="alert alert-danger">无法读取迁移历史</div>';
        return;
    }

    const payload = await response.json();
    migrationHistory = payload.tasks || [];
    if (migrationHistory.length === 0) {
        return;
    }

    historyDiv.innerHTML = '';
    migrationHistory.forEach((record, index) => {
        const success = record.status === 'completed';
        const recordDiv = document.createElement('div');
        recordDiv.className = 'border rounded p-3 mb-3';
        recordDiv.innerHTML = `
            <div class="row align-items-center">
                <div class="col-md-2">
                    <div class="text-center">
                        <i class="fas fa-${success ? 'check-circle text-success' : 'times-circle text-danger'} fa-2x"></i>
                        <div class="small text-muted mt-1">${success ? '成功' : record.status}</div>
                    </div>
                </div>
                <div class="col-md-5">
                    <h6 class="mb-1">迁移任务 ${record.task_id}</h6>
                    <div class="text-muted small">
                        <div>开始时间: ${new Date(record.start_time).toLocaleString()}</div>
                        ${record.end_time ? `<div>更新时间: ${new Date(record.end_time).toLocaleString()}</div>` : ''}
                        ${record.vault_path ? `<div>输出路径: ${record.vault_path}</div>` : ''}
                    </div>
                </div>
                <div class="col-md-3 text-center">
                    <div class="small">
                        <div>${record.stats?.total_notes || 0} 笔记</div>
                        <div>${record.stats?.total_attachments || 0} 附件</div>
                    </div>
                </div>
                <div class="col-md-2 text-end">
                    <button class="btn btn-sm btn-outline-primary mb-2" onclick="showResultDetails(${index})">
                        <i class="fas fa-eye me-1"></i>查看详情
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTask('${record.task_id}')">
                        <i class="fas fa-trash me-1"></i>删除缓存
                    </button>
                </div>
            </div>
        `;
        historyDiv.appendChild(recordDiv);
    });

    showResultDetails(0);
}

function showResultDetails(index) {
    const record = migrationHistory[index];
    if (!record) return;

    const latestResultDiv = document.getElementById('latestResult');
    const resultDetailsDiv = document.getElementById('resultDetails');
    const success = record.status === 'completed';
    const duration = record.start_time && record.end_time ?
        calculateDuration(record.start_time, record.end_time) : '未知';

    latestResultDiv.style.display = 'block';
    resultDetailsDiv.innerHTML = `
        <div class="row">
            <div class="col-md-6">
                <h6><i class="fas fa-info-circle me-1 text-primary"></i>基本信息</h6>
                <table class="table table-sm">
                    <tr><td>任务 ID:</td><td><code>${record.task_id}</code></td></tr>
                    <tr>
                        <td>状态:</td>
                        <td><span class="badge ${success ? 'bg-success' : 'bg-warning'}">${record.status}</span></td>
                    </tr>
                    <tr><td>开始时间:</td><td>${new Date(record.start_time).toLocaleString()}</td></tr>
                    <tr><td>更新时间:</td><td>${new Date(record.end_time).toLocaleString()}</td></tr>
                    <tr><td>耗时:</td><td>${duration}</td></tr>
                </table>
            </div>
            <div class="col-md-6">
                <h6><i class="fas fa-chart-pie me-1 text-primary"></i>统计信息</h6>
                <table class="table table-sm">
                    <tr><td>总笔记数:</td><td><strong>${record.stats?.total_notes || 0}</strong></td></tr>
                    <tr><td>成功转换:</td><td><strong class="text-success">${record.stats?.converted_notes || 0}</strong></td></tr>
                    <tr><td>跳过笔记:</td><td><strong class="text-warning">${record.stats?.skipped_notes || 0}</strong></td></tr>
                    <tr><td>附件数量:</td><td><strong>${record.stats?.total_attachments || 0}</strong></td></tr>
                </table>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <h6><i class="fas fa-folder me-1 text-primary"></i>输出信息</h6>
                <div class="alert alert-info">
                    <strong>Obsidian库位置:</strong><br>
                    <code>${record.vault_path || '未知'}</code>
                </div>
            </div>
        </div>

        ${record.warnings && record.warnings.length > 0 ? `
            <div class="alert alert-warning mt-4">
                <strong>警告:</strong>
                <ul class="mb-0">${record.warnings.map(warning => `<li>${warning}</li>`).join('')}</ul>
            </div>
        ` : ''}

        ${record.errors && record.errors.length > 0 ? `
            <div class="alert alert-danger mt-4">
                <strong>错误:</strong>
                <ul class="mb-0">${record.errors.map(error => `<li>${error.message || error}</li>`).join('')}</ul>
            </div>
        ` : ''}
    `;
}

async function deleteTask(taskId) {
    if (!confirm('确定要删除此任务缓存吗？')) {
        return;
    }
    const response = await fetch(`/api/tasks/${taskId}`, {
        method: 'DELETE',
        headers: authHeaders()
    });
    if (!response.ok) {
        alert('删除任务缓存失败');
        return;
    }
    await loadMigrationHistory();
    document.getElementById('latestResult').style.display = 'none';
}

function calculateDuration(startTime, endTime) {
    const start = new Date(startTime);
    const end = new Date(endTime);
    const duration = end - start;

    const hours = Math.floor(duration / 3600000);
    const minutes = Math.floor((duration % 3600000) / 60000);
    const seconds = Math.floor((duration % 60000) / 1000);

    if (hours > 0) {
        return `${hours}小时${minutes}分${seconds}秒`;
    } else if (minutes > 0) {
        return `${minutes}分${seconds}秒`;
    } else {
        return `${seconds}秒`;
    }
}
</script>
{% endblock %}
